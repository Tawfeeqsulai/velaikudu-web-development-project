<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruiter Login — Velaikudu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <p class="login-logo">Velai<span>kudu</span></p>
      <p>Sign in to manage your job listings and reach top talent.</p>

      <div class="login-field">
        <label>Username</label>
        <input id="username" type="text" placeholder="Enter username" autocomplete="username">
      </div>

      <div class="login-field">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') login()">
      </div>

      <button class="login-btn" onclick="login()" id="loginBtn">Sign In →</button>

      <div id="loginError" style="display:none; margin-top:14px; padding:12px 16px;
           background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2);
           border-radius:8px; font-size:13px; color:#f87171; text-align:center;">
        ❌ Invalid username or password
      </div>

      <a href="index.html" class="login-back">← Back to Job Portal</a>
    </div>
  </div>

  <script>
  // If already logged in, skip to admin
  const token = localStorage.getItem('token');
  const loginTime = localStorage.getItem('loginTime');

  if (token === 'securetoken123' && loginTime) {
    const now = Date.now();
    const diff = now - loginTime;

    // 30 minutes session check
    if (diff < 30 * 60 * 1000) {
      window.location.href = 'admin.html';
    } else {
      // expired session
      localStorage.clear();
    }
  }

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorEl  = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');

    if (!username || !password) {
      errorEl.textContent = '⚠️ Please enter both username and password.';
      errorEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Signing in…';
    btn.disabled = true;
    errorEl.style.display = 'none';

    try {
      const res = await fetch('https://velaikudu.onrender.com/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        // 🔐 SAVE TOKEN + LOGIN TIME
        localStorage.setItem('token', data.token);
        localStorage.setItem('loginTime', Date.now());

        window.location.href = 'admin.html';
      } else {
        errorEl.textContent = '❌ Invalid username or password.';
        errorEl.style.display = 'block';
      }
    } catch {
      errorEl.textContent = '⚠️ Cannot connect to server. Is it running?';
      errorEl.style.display = 'block';
    } finally {
      btn.textContent = 'Sign In →';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
